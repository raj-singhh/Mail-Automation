# Configuration file for Mail Automation Tool
# You can modify these settings as needed

[GMAIL]
# Gmail server settings
GMAIL_URL = https://gmail.com
WAIT_TIMEOUT = 10  # seconds to wait for page elements

[CHROME]
# Chrome settings
HEADLESS = False          # Set to True to run Chrome in background
DISABLE_IMAGES = False    # Set to True to disable image loading (faster)
IMPLICIT_WAIT = 10        # seconds

[EMAIL]
# Email settings
DELAY_BETWEEN_EMAILS = 3  # seconds delay between sending emails
MAX_EMAILS_PER_BATCH = 30 # recommended batch size to avoid rate limiting
INCLUDE_SIGNATURE = True  # Auto-add signature

[LOGGING]
# Logging settings
LOG_LEVEL = INFO          # DEBUG, INFO, WARNING, ERROR
LOG_FILE = logs/mail_automation.log

[ATTACHMENTS]
# Attachment settings
MAX_FILE_SIZE = 25        # MB
ALLOWED_FORMATS = pdf, docx, doc, txt, pptx
